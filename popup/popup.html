<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SocialCleaner</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>

  <!-- Header -->
  <header>
    <span class="logo">⚡</span>
    <span class="title">SocialCleaner</span>
    <span class="version">v1.0.0</span>
  </header>

  <!-- Warning banner (shown when on wrong page) -->
  <div id="warning" class="warning hidden">
    <span class="warning-icon">⚠️</span>
    <span id="warning-text">Navigate to the correct page first.</span>
  </div>

  <!-- Platform badge -->
  <div id="platform-badge" class="platform-badge hidden">
    <span id="platform-name">Facebook</span>
    <span class="badge-dot"></span>
    <span class="badge-label">Ready</span>
  </div>

  <!-- Counter -->
  <div class="counter-wrap">
    <div class="counter" id="counter">0</div>
    <div class="counter-label">unfollowed</div>
  </div>

  <!-- Status -->
  <div class="status" id="status">Waiting to start...</div>

  <!-- Settings -->
  <div class="settings">
    <div class="setting-row">
      <label for="delay">Speed (ms)</label>
      <input type="number" id="delay" value="1500" min="500" max="5000" step="100" />
    </div>
    <div class="setting-row">
      <label for="batch">Batch size</label>
      <input type="number" id="batch" value="30" min="5" max="100" step="5" />
    </div>
    <div class="setting-row">
      <label for="break">Break (ms)</label>
      <input type="number" id="break" value="5000" min="1000" max="30000" step="1000" />
    </div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <button id="btn-start" class="btn btn-start">Start</button>
    <button id="btn-stop" class="btn btn-stop hidden">Stop</button>
    <button id="btn-resume" class="btn btn-resume hidden">Resume</button>
  </div>

  <!-- Footer -->
  <footer>
    <a href="https://github.com/NoCodegeek/socialcleaner-extension" target="_blank">GitHub</a>
    <span>·</span>
    <span>Use responsibly</span>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
